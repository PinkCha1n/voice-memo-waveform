<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>录音播放波形组件</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #050816;
      --bg-1: #0b1020;
      --bg-2: #121826;
      --card: rgba(8, 12, 28, 0.72);
      --card-border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #ff6a5f;
      --accent-2: #ff9a3c;
      --button-bg: rgba(255, 255, 255, 0.1);
      --button-border: rgba(255, 255, 255, 0.08);
      --button-primary: linear-gradient(135deg, #ff6a5f, #ff9a3c);
      --button-secondary: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100svh;
      font-family: Inter, "SF Pro Display", "Avenir Next", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 106, 95, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 154, 60, 0.18), transparent 32%),
        linear-gradient(160deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 760px);
    }

    .panel {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 28px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        radial-gradient(circle at top right, rgba(255, 106, 95, 0.2), transparent 30%),
        radial-gradient(circle at bottom left, rgba(255, 154, 60, 0.12), transparent 24%);
      z-index: -1;
      pointer-events: none;
    }

    h1 {
      margin: 16px 0 12px;
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .uploader {
      margin-top: 24px;
      padding: 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: grid;
      gap: 14px;
    }

    .uploader-header {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
      align-items: center;
    }

    .uploader-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      color: var(--text);
      font: inherit;
      font-weight: 600;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    button:disabled {
      cursor: progress;
      opacity: 0.55;
      transform: none;
      box-shadow: none;
    }

    button.primary {
      background: var(--button-primary);
      color: #fff;
      box-shadow: 0 14px 28px rgba(255, 106, 95, 0.2);
    }

    button.secondary {
      background: var(--button-secondary);
    }

    .wave-shell {
      padding: 16px;
      border-radius: 20px;
      background: rgba(2, 6, 23, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    voice-memo-waveform {
      display: block;
      width: 100%;
      height: 58px;
      --voice-waveform-color: #ff6a5f;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .file-pill {
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #dbeafe;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .panel {
        border-radius: 24px;
        padding: 20px;
      }

      .uploader {
        padding: 16px;
      }

      .uploader-actions {
        width: 100%;
      }

      button {
        flex: 1 1 auto;
      }

      .status-bar {
        align-items: flex-start;
      }

      .file-list {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>录音播放波形组件</h1>

      <div class="uploader">
        <div class="uploader-header">
          <div class="uploader-actions">
            <button id="addFiles" class="secondary" type="button">添加录音</button>
            <button id="play" class="primary" type="button" disabled>播放</button>
            <button id="pause" class="secondary" type="button" disabled>暂停</button>
            <button id="clear" class="secondary" type="button" disabled>清空</button>
          </div>
        </div>

        <input id="fileInput" type="file" accept="audio/*,.m4a,.mp4,audio/mp4,audio/x-m4a" multiple />

        <div class="wave-shell">
          <voice-memo-waveform
            id="wave"
            min-height="12"
            max-height="58"
            gap="6"
            bar-width="4"
            sample-interval="72"
            history-ms="5600"
            color="#ff6a5f"
          ></voice-memo-waveform>
        </div>

        <div class="status-bar">
          <div class="status" id="status">尚未添加录音文件。</div>
          <div class="file-list" id="fileList"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="src/voice-memo-waveform.js"></script>
  <script>
    const wave = document.getElementById('wave');
    const status = document.getElementById('status');
    const fileList = document.getElementById('fileList');
    const fileInput = document.getElementById('fileInput');
    const addFilesButton = document.getElementById('addFiles');
    const playButton = document.getElementById('play');
    const pauseButton = document.getElementById('pause');
    const clearButton = document.getElementById('clear');

    const uploadedFiles = [];
    let busy = false;
    let currentState = wave.state;

    function formatBytes(bytes) {
      const units = ['B', 'KB', 'MB', 'GB'];
      let size = bytes;
      let unitIndex = 0;

      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex += 1;
      }

      return `${size >= 10 || unitIndex === 0 ? size.toFixed(0) : size.toFixed(1)} ${units[unitIndex]}`;
    }

    function formatDuration(durationMs) {
      if (!Number.isFinite(durationMs) || durationMs <= 0) return '0:00';
      const totalSeconds = Math.round(durationMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function renderFiles() {
      fileList.innerHTML = uploadedFiles
        .map((item) => `<span class="file-pill">${item.name} · ${formatDuration(item.durationMs)} · ${formatBytes(item.size)}</span>`)
        .join('');
    }

    function updateControls() {
      const hasFiles = currentState.canPlay;
      playButton.disabled = busy || !hasFiles || currentState.playing;
      pauseButton.disabled = busy || !currentState.playing;
      clearButton.disabled = busy || !hasFiles;
      addFilesButton.disabled = busy;
      addFilesButton.textContent = busy ? '处理中…' : '添加录音';
    }

    function updateStatusText(text) {
      status.textContent = text;
    }

    function syncState() {
      currentState = wave.state;
      updateControls();

      if (busy) {
        return;
      }

      if (!currentState.canPlay) {
        updateStatusText('尚未添加录音文件。');
        return;
      }

      if (currentState.playing) {
        updateStatusText(`正在播放：${currentState.currentTrackName || '录音'}。`);
        return;
      }

      updateStatusText(`已加载 ${uploadedFiles.length} 个录音文件，点击播放。`);
    }

    async function processFiles(files) {
      if (!files.length || busy) return;

      busy = true;
      updateControls();

      try {
        for (let index = 0; index < files.length; index += 1) {
          const file = files[index];
          updateStatusText(`正在解析 ${file.name} (${index + 1}/${files.length})`);

          const summary = uploadedFiles.length === 0 && index === 0
            ? await wave.loadAudioFile(file)
            : await wave.appendAudioFile(file);

          uploadedFiles.push({
            name: file.name,
            size: file.size,
            durationMs: summary?.durationMs ?? 0,
          });
          renderFiles();
        }
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        updateStatusText(`解析失败：${message}`);
      } finally {
        fileInput.value = '';
        busy = false;
        syncState();
      }
    }

    addFilesButton.addEventListener('click', () => {
      if (!busy) {
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', () => {
      const files = Array.from(fileInput.files ?? []);
      processFiles(files);
    });

    playButton.addEventListener('click', async () => {
      if (busy) return;
      try {
        await wave.play();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        updateStatusText(`播放失败：${message}`);
      }
      syncState();
    });

    pauseButton.addEventListener('click', () => {
      if (busy) return;
      wave.pause();
      syncState();
    });

    clearButton.addEventListener('click', () => {
      if (busy) return;
      uploadedFiles.length = 0;
      renderFiles();
      wave.clear();
      fileInput.value = '';
      syncState();
    });

    wave.addEventListener('statechange', syncState);
    syncState();
  </script>
</body>
</html>
